namespace:
  create: true
  name: tentacular-kraken

replicaCount: 1

image:
  repository: ghcr.io/randybias/thekraken
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to .Chart.AppVersion

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 4000m
    memory: 8Gi

livenessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 6

persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce
  storageClass: ""

slack:
  mode: "http"

ingress:
  enabled: true
  host: "kraken.eastus-dev1.ospo-dev.miralabs.dev"
  clusterIssuer: "letsencrypt-prod"

# Secrets — set via --set or existingSecret, never committed
secrets:
  slackBotToken: ""
  slackAppToken: ""
  slackSigningSecret: ""
  anthropicApiKey: ""
  openaiApiKey: ""       # Optional, for OpenAI provider
  geminiApiKey: ""       # Optional, for Google Gemini provider
  oidcClientSecret: ""
  existingSecret: ""

mcp:
  url: "http://tentacular-mcp:8080"
  port: 8080

oidc:
  issuer: ""
  clientId: ""

# LLM provider configuration (design Section 15)
llm:
  defaultProvider: "anthropic"
  defaultModel: "claude-sonnet-4-6"
  allowedProviders: "anthropic,openai,google"
  # Format: provider:model1|model2,provider:model1|model2
  allowedModels: "anthropic:claude-sonnet-4-6|claude-opus-4-6|claude-sonnet-4-6-thinking,openai:gpt-5.3-chat-latest|gpt-5.4,google:gemini-3-pro-preview|gemini-3.1-pro"
  disallowedModels: "gpt-4o,o3,o4-mini,gpt-5-nano,gpt-5-mini,gemini-2.5-pro"

# Git-backed state — REQUIRED in v2 (no enabled toggle)
# Both repoUrl and credentialsSecret are validated by Helm required() before pod creation.
gitState:
  repoUrl: ""                 # REQUIRED — Helm template fails if empty
  branch: "main"
  credentialsSecret: ""       # REQUIRED — K8s Secret with key 'token'
  userName: "The Kraken"
  userEmail: "kraken@tentacular.dev"
  dir: "/app/data/git-state"

networkPolicy:
  enabled: true

nodeSelector: {}
tolerations: []
affinity: {}
