{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "thekraken.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thekraken.labels" . | nindent 4 }}
type: Opaque
stringData:
  SLACK_BOT_TOKEN: {{ required "secrets.slackBotToken is required" .Values.secrets.slackBotToken | quote }}
  {{- if eq .Values.slack.mode "socket" }}
  SLACK_APP_TOKEN: {{ required "secrets.slackAppToken is required in socket mode" .Values.secrets.slackAppToken | quote }}
  {{- else }}
  SLACK_APP_TOKEN: {{ .Values.secrets.slackAppToken | quote }}
  {{- end }}
  {{- if eq .Values.slack.mode "http" }}
  SLACK_SIGNING_SECRET: {{ required "secrets.slackSigningSecret is required in http mode" .Values.secrets.slackSigningSecret | quote }}
  {{- end }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.geminiApiKey }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.oidcClientSecret }}
  OIDC_CLIENT_SECRET: {{ .Values.secrets.oidcClientSecret | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.drift.secretName (not .Values.secrets.existingSecret) }}
---
# Drift detection service token secret (Phase 3, D6 exception).
# Created separately so it can be rotated independently of the main secret.
# Must contain key 'service-token'.
# Reference: design.md Section 6.1 — D6 exception for drift detection.
{{- end }}

