{{- if and .Values.ingress.enabled (eq .Values.slack.mode "http") -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "thekraken.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thekraken.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ include "thekraken.fullname" . }}-tls
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /slack/events
            pathType: Exact
            backend:
              service:
                name: {{ include "thekraken.fullname" . }}
                port:
                  number: 3000
{{- end }}
