apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "thekraken.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thekraken.labels" . | nindent 4 }}
data:
  TENTACULAR_MCP_URL: {{ .Values.mcp.url | quote }}
  MCP_PORT: {{ .Values.mcp.port | quote }}
  KRAKEN_DATA_DIR: "/app/data"
  OIDC_ISSUER: {{ .Values.oidc.issuer | quote }}
  OIDC_CLIENT_ID: {{ .Values.oidc.clientId | quote }}
  TNTC_REGISTRY: "ghcr.io/randybias"
  SLACK_MODE: {{ .Values.slack.mode | quote }}
  # Git-backed state — always enabled in v2 (no enabled toggle)
  GIT_STATE_REPO_URL: {{ .Values.gitState.repoUrl | quote }}
  GIT_STATE_BRANCH: {{ .Values.gitState.branch | default "main" | quote }}
  GIT_STATE_DIR: {{ .Values.gitState.dir | default "/app/data/git-state" | quote }}
  GIT_STATE_USER_NAME: {{ .Values.gitState.userName | default "The Kraken" | quote }}
  GIT_STATE_USER_EMAIL: {{ .Values.gitState.userEmail | default "kraken@tentacular.dev" | quote }}
  # LLM provider configuration
  LLM_DEFAULT_PROVIDER: {{ .Values.llm.defaultProvider | quote }}
  LLM_DEFAULT_MODEL: {{ .Values.llm.defaultModel | quote }}
  LLM_ALLOWED_PROVIDERS: {{ .Values.llm.allowedProviders | quote }}
  LLM_ALLOWED_MODELS: {{ .Values.llm.allowedModels | quote }}
  LLM_DISALLOWED_MODELS: {{ .Values.llm.disallowedModels | quote }}
