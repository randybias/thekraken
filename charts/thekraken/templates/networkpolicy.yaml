{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "thekraken.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thekraken.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "thekraken.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Egress
    - Ingress
  {{- if eq .Values.slack.mode "http" }}
  # Allow Traefik ingress controller -> port 3000 for Slack Events API
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 3000
  {{- else }}
  # No ingress rules = deny all inbound traffic.
  # Kubelet health probes use host networking and bypass NetworkPolicy.
  ingress: []
  {{- end }}
  egress:
    # kube-dns: UDP + TCP port 53 — scoped to kube-dns pods only
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # External HTTPS (Slack API, Anthropic API, GitHub, Keycloak)
    # Standard NetworkPolicy cannot filter by FQDN.
    # For Cilium clusters, supplement with a CiliumNetworkPolicy using toFQDNs.
    - ports:
        - protocol: TCP
          port: 443

    # tentacular-mcp in-cluster service — scoped to tentacular-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tentacular-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: tentacular-mcp
      ports:
        - protocol: TCP
          port: {{ .Values.mcp.port }}

    # Git SSH egress — needed when cloning/pulling via SSH
    # v2 change: always included (no gitState.enabled conditional)
    - ports:
        - protocol: TCP
          port: 22
{{- end }}
